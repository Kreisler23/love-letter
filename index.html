<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body{
    margin:0;
    background:#ffeef3;
    font-family:Arial, sans-serif;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

h1{
    color:#e91e63;
    font-size:50px;
}

p{
    font-size:20px;
    color:#444;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-top:30px;
}

.gallery img{
    width:100%;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.letter{
    background:white;
    margin-top:40px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    text-align:left;
    line-height:1.8;
}
</style>

</head>
<body>

<div class="container">

<h1>❤️ For My Love ❤️</h1>

<p>
If you're reading this, it means you scanned my little surprise.
Thank you for being the best part of my life.
</p>

<div class="gallery">
<img src="silao1.jfif">
<img src="silao2.jfif">
<img src="silao3.jfif">
<img src="silao4.jfif">
<img src="silao5.jfif">
<img src="silao6.jfif">
<img src="silao7.jfif">
</div>

<div class="letter">

<h2>💌 My Letter</h2>

<p>
I love you so much love, i hope we stay together for more months/years to come. 
</p>

<p>
Love always,<br>
Kenneth ❤️
</p>

</div>

</div>

</body>
</html>
